naftiko: "1.0.0-alpha1"

info:
  label: "Web of Science Starter API"
  description: "The Web of Science Starter API for basic bibliographic metadata search and retrieval including documents and journals from the Web of Science Core Collection."
  tags:
    - Research
    - Academic
    - Bibliometrics
    - Documents
    - Journals
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WOS_API_KEY: WOS_API_KEY

capability:
  consumes:
    - type: http
      namespace: wos-starter
      baseUri: https://api.clarivate.com/apis/wos-starter/v1
      description: "Web of Science Starter API for document and journal search."
      resources:
        - name: documents
          path: /documents
          description: "Document search and retrieval"
          operations:
            - name: search-documents
              method: GET
              description: "Search Web of Science documents"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Advanced query syntax string"
                - name: db
                  in: query
                  type: string
                  required: false
                  description: "Database to search"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of records to return"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: document
          path: /documents/{uid}
          description: "Individual document retrieval"
          operations:
            - name: get-document
              method: GET
              description: "Get a specific document by UID"
              inputParameters:
                - name: uid
                  in: path
                  type: string
                  required: true
                  description: "Web of Science unique identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: journals
          path: /journals
          description: "Journal search and retrieval"
          operations:
            - name: search-journals
              method: GET
              description: "Search journals by ISSN or name"
              inputParameters:
                - name: issn
                  in: query
                  type: string
                  required: false
                  description: "Journal ISSN"
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Free-text search query"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: journal
          path: /journals/{id}
          description: "Individual journal retrieval"
          operations:
            - name: get-journal
              method: GET
              description: "Get journal details by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Web of Science journal identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8104
      namespace: wos-starter-rest
      resources:
        - path: /v1/documents
          name: documents
          operations:
            - method: GET
              name: search-documents
              description: "Search WOS documents"
              call: "wos-starter.search-documents"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: wos-starter-mcp
      transport: http
      tools:
        - name: search-wos-documents
          description: "Search Web of Science documents using advanced query syntax"
          hints:
            readOnly: true
            openWorld: true
          call: "wos-starter.search-documents"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-wos-document
          description: "Get a specific Web of Science document by UID"
          hints:
            readOnly: true
            openWorld: false
          call: "wos-starter.get-document"
          with:
            uid: "tools.uid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-journals
          description: "Search Web of Science journals by ISSN or name"
          hints:
            readOnly: true
            openWorld: true
          call: "wos-starter.search-journals"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-journal
          description: "Get details of a specific Web of Science journal"
          hints:
            readOnly: true
            openWorld: false
          call: "wos-starter.get-journal"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
