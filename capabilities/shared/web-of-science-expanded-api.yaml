naftiko: "1.0.0-alpha1"

info:
  label: "Web of Science API Expanded"
  description: "The Web of Science API Expanded for rich bibliographic search, citation analysis, related records discovery, and bibliometric reporting."
  tags:
    - Research
    - Academic
    - Bibliometrics
    - Citations
    - Search
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WOS_API_KEY: WOS_API_KEY

capability:
  consumes:
    - type: http
      namespace: wos-expanded
      baseUri: https://api.clarivate.com/api/wos
      description: "Web of Science API Expanded for full bibliometric analysis."
      resources:
        - name: search
          path: /
          description: "Document search operations"
          operations:
            - name: search-documents
              method: GET
              description: "Search Web of Science documents"
              inputParameters:
                - name: databaseId
                  in: query
                  type: string
                  required: true
                  description: "Database to search"
                - name: usrQuery
                  in: query
                  type: string
                  required: true
                  description: "Advanced search query"
                - name: count
                  in: query
                  type: integer
                  required: false
                  description: "Number of records"
                - name: firstRecord
                  in: query
                  type: integer
                  required: false
                  description: "Starting record for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: query-results
          path: /query/{queryId}
          description: "Paginate through query results"
          operations:
            - name: get-query-results
              method: GET
              description: "Get results from a previous search query"
              inputParameters:
                - name: queryId
                  in: path
                  type: integer
                  required: true
                  description: "Query identifier from search"
                - name: count
                  in: query
                  type: integer
                  required: false
                  description: "Number of records"
                - name: firstRecord
                  in: query
                  type: integer
                  required: false
                  description: "Starting record"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: record-ids
          path: /recordids/{queryId}
          description: "Get record UIDs from a query"
          operations:
            - name: get-record-ids
              method: GET
              description: "Get only UIDs from a query result set"
              inputParameters:
                - name: queryId
                  in: path
                  type: integer
                  required: true
                  description: "Query identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: record-by-id
          path: /id/{uniqueId}
          description: "Retrieve records by UID"
          operations:
            - name: get-record-by-id
              method: GET
              description: "Get records by WOS unique identifier"
              inputParameters:
                - name: uniqueId
                  in: path
                  type: string
                  required: true
                  description: "WOS unique identifier(s)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: citing
          path: /citing
          description: "Find citing articles"
          operations:
            - name: get-citing-articles
              method: GET
              description: "Get articles citing a specific document"
              inputParameters:
                - name: databaseId
                  in: query
                  type: string
                  required: true
                  description: "Database identifier"
                - name: uniqueId
                  in: query
                  type: string
                  required: true
                  description: "WOS UID of the cited article"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: references
          path: /references
          description: "Get document references"
          operations:
            - name: get-references
              method: GET
              description: "Get the reference list of a document"
              inputParameters:
                - name: databaseId
                  in: query
                  type: string
                  required: true
                  description: "Database identifier"
                - name: uniqueId
                  in: query
                  type: string
                  required: true
                  description: "WOS UID of the document"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: related
          path: /related
          description: "Find related records"
          operations:
            - name: get-related-records
              method: GET
              description: "Get records sharing cited references with a document"
              inputParameters:
                - name: databaseId
                  in: query
                  type: string
                  required: true
                  description: "Database identifier"
                - name: uniqueId
                  in: query
                  type: string
                  required: true
                  description: "WOS UID of the source document"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: citation-report
          path: /citation-report/{queryId}
          description: "Citation report generation"
          operations:
            - name: get-citation-report
              method: GET
              description: "Generate citation report for a query result set"
              inputParameters:
                - name: queryId
                  in: path
                  type: integer
                  required: true
                  description: "Query identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8105
      namespace: wos-expanded-rest
      resources:
        - path: /v1/search
          name: search
          operations:
            - method: GET
              name: search-documents
              description: "Search WOS documents"
              call: "wos-expanded.search-documents"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9105
      namespace: wos-expanded-mcp
      transport: http
      tools:
        - name: search-expanded
          description: "Search Web of Science using advanced query syntax"
          hints:
            readOnly: true
            openWorld: true
          call: "wos-expanded.search-documents"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-citing-articles
          description: "Find articles that cite a specific Web of Science document"
          hints:
            readOnly: true
            openWorld: true
          call: "wos-expanded.get-citing-articles"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-references
          description: "Get the reference list cited by a specific document"
          hints:
            readOnly: true
            openWorld: false
          call: "wos-expanded.get-references"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-related-records
          description: "Discover records that share cited references with a document"
          hints:
            readOnly: true
            openWorld: true
          call: "wos-expanded.get-related-records"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-citation-report
          description: "Generate a citation report with h-index and citation counts"
          hints:
            readOnly: true
            openWorld: false
          call: "wos-expanded.get-citation-report"
          outputParameters:
            - type: object
              mapping: "$."
